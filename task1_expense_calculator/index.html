<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Expense Calculator</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
	</head>
	<body class="bg-light py-5">
		<div class="container" style="max-width: 600px">
			<div class="card shadow">
				<div class="card-header bg-primary text-white">
					<h1 class="mb-0">💰 Expense Calculator</h1>
				</div>
				<div class="card-body">
					<div class="mb-4">
						<label class="form-label">Add Expense</label>
						<div class="input-group">
							<input
								type="number"
								id="expenseInput"
								class="form-control"
								placeholder="Enter expense amount"
								step="0.01"
							/>
							<button id="addBtn" class="btn btn-primary">Add</button>
						</div>
					</div>

					<div class="mb-4">
						<h5>Expense List</h5>
						<ul id="expenseList" class="list-group"></ul>
					</div>

					<div class="alert alert-info mb-4">
						<h5 class="mb-0">
							Total Expenses: <span id="totalAmount">0.00</span> ৳
						</h5>
					</div>

					<button id="clearBtn" class="btn btn-danger w-100">Clear All</button>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
		<script src="script.js"></script>
	</body>
</html>
